version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - misspell
    - unconvert
    - unparam
    - unused
    - godot
    - godox

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
  godot:
    scope: toplevel
    capital: true

issues:
  exclude-use-default: false
  fix: true
