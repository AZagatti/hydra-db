# yaml-language-server: $schema=https://golangci-lint.run/schema/json/golangci.jsonschema.json
version: "1.29"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers=true
  godot:
    scope: toplevel
    capital: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - misspell
    - unconvert
    - unparam
    - unused
    - godot
    - godox

issues:
  exclude-use-default: false