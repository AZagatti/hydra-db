# yaml-language-server: $schema=https://golangci-lint.run/schema/json/golangci.jsonschema.json
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - misspell
    - unconvert
    - unparam
    - unused
    - godot

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers=true
  godot:
    scope: toplevel
    capital: true

issues:
  exclude-use-default: false