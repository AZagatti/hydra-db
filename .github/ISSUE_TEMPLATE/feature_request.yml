name: Feature Request
description: Request a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Hydra does this affect?
      options:
        - Gateway
        - Agent Runtime
        - Execution Plane
        - Memory Plane
        - Policy Engine
        - Adapters
        - Body (shared core)
        - Other
