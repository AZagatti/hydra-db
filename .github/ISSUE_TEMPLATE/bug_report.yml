name: Bug Report
description: Report a bug in Hydra
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `make run`
        2. Send POST to /api/v1/chat
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Hydra Version
      description: What version are you running?
      placeholder: "0.1.0"
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, etc.
      placeholder: |
        OS: Linux
        Go: 1.26.2
